<div class="layout">
  <aside class="sidebar">
    <div class="brand">⬡ Products<span>API</span></div>
    <nav>
      <a class="nav-item" routerLink="/products">📦 Productos</a>
      <a class="nav-item active" routerLink="/products/new">➕ Nuevo</a>
      <a class="nav-item" (click)="showCategoryModal = true" style="cursor:pointer">🏷️ Nueva categoría</a>
    </nav>
  </aside>

  <main class="main">
    <div class="page-header">
      <a class="back" routerLink="/products">← Volver</a>
      <h2>{{ isEdit ? 'Editar producto' : 'Nuevo producto' }}</h2>
    </div>

    <div class="card">
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="grid-2">
          <div class="field">
            <label>Nombre *</label>
            <input formControlName="name" placeholder="Dell PowerEdge R740"
              [class.error]="submitted && f['name'].errors" />
            <span class="err" *ngIf="submitted && f['name'].errors?.['required']">Requerido</span>
          </div>

          <div class="field">
            <label>Categoría *</label>
            <select formControlName="categoryId" [class.error]="submitted && f['categoryId'].errors">
              <option value="">Seleccionar...</option>
              <option *ngFor="let c of categories" [value]="c.id">{{ c.name }}</option>
            </select>
            <span class="err" *ngIf="submitted && f['categoryId'].errors?.['required']">Requerido</span>
          </div>

          <div class="field">
            <label>Precio unitario</label>
            <input type="number" formControlName="unitPrice" placeholder="0.00" min="0" step="0.01" />
          </div>

          <div class="field">
            <label>Cantidad por unidad</label>
            <input formControlName="quantityPerUnit" placeholder="1 unit" />
          </div>

          <div class="field">
            <label>Unidades en stock</label>
            <input type="number" formControlName="unitsInStock" min="0" />
          </div>

          <div class="field">
            <label>Unidades en pedido</label>
            <input type="number" formControlName="unitsOnOrder" min="0" />
          </div>

          <div class="field">
            <label>Nivel de reorden</label>
            <input type="number" formControlName="reorderLevel" min="0" />
          </div>

          <div class="field field-check">
            <label>
              <input type="checkbox" formControlName="discontinued" />
              Descontinuado
            </label>
          </div>
        </div>

        <div class="api-error" *ngIf="apiError">{{ apiError }}</div>

        <div class="form-actions">
          <a class="btn-ghost" routerLink="/products">Cancelar</a>
          <button type="submit" class="btn-primary" [disabled]="loading">
            {{ loading ? 'Guardando...' : (isEdit ? 'Actualizar' : 'Crear producto') }}
          </button>
        </div>
      </form>
    </div>

    <div class="modal-backdrop" *ngIf="showCategoryModal" (click)="showCategoryModal = false">
      <div class="modal" (click)="$event.stopPropagation()">
        <h3>🏷️ Nueva categoría</h3>
        <div class="modal-field">
          <label>Nombre</label>
          <input type="text" [(ngModel)]="newCategoryName" placeholder="SERVIDORES" />
        </div>
        <div class="api-error" *ngIf="categoryError">{{ categoryError }}</div>
        <div class="modal-actions">
          <button class="btn-ghost" (click)="showCategoryModal = false">Cancelar</button>
          <button class="btn-primary" (click)="createCategory()" [disabled]="!newCategoryName.trim()">
            Crear
          </button>
        </div>
      </div>
    </div>
  </main>
</div>

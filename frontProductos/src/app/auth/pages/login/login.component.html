<div class="login-wrapper">
  <div class="login-card">
    <div class="brand">
      <div class="brand-icon">⬡</div>
      <h1>Products<span>API</span></h1>
      <p>Panel de Administración</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="field">
        <label>Usuario</label>
        <input type="text" formControlName="username" placeholder="admin"
          [class.error]="submitted && f['username'].errors" />
        <span class="err" *ngIf="submitted && f['username'].errors?.['required']">Campo requerido</span>
      </div>

      <div class="field">
        <label>Contraseña</label>
        <input type="password" formControlName="password" placeholder="••••••••"
          [class.error]="submitted && f['password'].errors" />
        <span class="err" *ngIf="submitted && f['password'].errors?.['required']">Campo requerido</span>
        <span class="err" *ngIf="submitted && f['password'].errors?.['minlength']">Mínimo 6 caracteres</span>
      </div>

      <div class="api-error" *ngIf="apiError">{{ apiError }}</div>

      <button type="submit" [disabled]="loading" class="btn-primary">
        <span *ngIf="!loading">Ingresar</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>
    </form>
    <p class="hint">Demo: admin / admin123</p>
  </div>
</div>
